services:
  init-secrets:
    image: alpine:3.20
    entrypoint:
      [
        "sh",
        "-c",
        "set -eu; mkdir -p /run/secrets; if [ ! -s /run/secrets/postgres_password ]; then head -c 48 /dev/urandom | base64 | tr -d '\\n' > /run/secrets/postgres_password; fi; if [ ! -s /run/secrets/backup_encryption_key ]; then head -c 32 /dev/urandom | base64 | tr -d '\\n' | tr '+/' '-_' > /run/secrets/backup_encryption_key; fi; chmod 600 /run/secrets/postgres_password /run/secrets/backup_encryption_key"
      ]
    volumes:
      - trailforge_runtime_secrets:/run/secrets
    restart: "no"

  postgres:
    image: postgres:16-alpine
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: trailforge
      POSTGRES_USER: trailforge
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - trailforge_pgdata:/var/lib/postgresql/data
      - trailforge_runtime_secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trailforge -d trailforge"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      init-secrets:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      TF_DB_HOST: postgres
      TF_DB_PORT: "5432"
      TF_DB_NAME: trailforge
      TF_DB_USER: trailforge
      TF_DB_PASSWORD_FILE: /run/secrets/postgres_password
      TF_ALLOWED_ORIGINS: '["https://localhost:5173","https://frontend:5173"]'
      TF_SESSION_COOKIE_SECURE: "false"
      CI: "true"
      TF_BOOTSTRAP_CREDS_PATH: /bootstrap/admin_credentials.txt
      TF_TOKEN_ENCRYPTION_KEY_PATH: /bootstrap/token_encryption.key
      TF_BACKUP_ENCRYPTION_KEY_PATH: /run/secrets/backup_encryption_key
      TF_BACKUP_ROOT: /var/lib/trailforge/backups
    volumes:
      - trailforge_certs:/certs
      - trailforge_bootstrap:/bootstrap
      - trailforge_assets:/var/lib/trailforge/assets
      - trailforge_backups:/var/lib/trailforge/backups
      - trailforge_runtime_secrets:/run/secrets:ro
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "curl -kfsS https://localhost:8443/api/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: base
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_DEV_HOST: 0.0.0.0
      VITE_DEV_PORT: "5173"
      VITE_BACKEND_PROXY_TARGET: https://backend:8443
    volumes:
      - trailforge_certs:/certs:ro
    ports:
      - "5173:5173"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('https').get({hostname:'localhost',port:5173,path:'/login',rejectUnauthorized:false},r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  ops-daemon:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      init-secrets:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      TF_DB_HOST: postgres
      TF_DB_PORT: "5432"
      TF_DB_NAME: trailforge
      TF_DB_USER: trailforge
      TF_DB_PASSWORD_FILE: /run/secrets/postgres_password
      TF_BACKUP_ENCRYPTION_KEY_PATH: /run/secrets/backup_encryption_key
      TF_BACKUP_ROOT: /var/lib/trailforge/backups
      TF_ASSET_STORAGE_ROOT: /var/lib/trailforge/assets
    volumes:
      - trailforge_assets:/var/lib/trailforge/assets
      - trailforge_backups:/var/lib/trailforge/backups
      - trailforge_runtime_secrets:/run/secrets:ro
    working_dir: /app
    command: ["python", "-m", "scripts.operations_daemon"]
    restart: unless-stopped

  backend-tests:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["tests"]
    depends_on:
      init-secrets:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      TF_DB_HOST: postgres
      TF_DB_PORT: "5432"
      TF_DB_NAME: trailforge
      TF_DB_USER: trailforge
      TF_DB_PASSWORD_FILE: /run/secrets/postgres_password
      TF_SESSION_COOKIE_SECURE: "false"
      TF_BOOTSTRAP_CREDS_PATH: /bootstrap/admin_credentials.txt
      TF_TOKEN_ENCRYPTION_KEY_PATH: /bootstrap/token_encryption.key
      TF_BACKUP_ENCRYPTION_KEY_PATH: /run/secrets/backup_encryption_key
      TF_BACKUP_ROOT: /var/lib/trailforge/backups
    volumes:
      - trailforge_bootstrap:/bootstrap
      - trailforge_backups:/var/lib/trailforge/backups
      - trailforge_runtime_secrets:/run/secrets:ro
    command: ["bash", "-lc", "alembic upgrade head && pytest -q"]

  frontend-tests:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: base
    profiles: ["tests"]
    command: ["npm", "run", "test:unit", "--", "--run"]

  e2e-tests:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: e2e
    profiles: ["tests"]
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: https://frontend:5173
      E2E_BOOTSTRAP_CREDS_FILE: /bootstrap/admin_credentials.txt
    volumes:
      - trailforge_certs:/certs:ro
      - trailforge_bootstrap:/bootstrap:ro
      - ./frontend/test-results:/app/frontend/test-results
      - ./frontend/playwright-report:/app/frontend/playwright-report
    command: ["bash", "-lc", "bash ./scripts/run_e2e_with_bootstrap.sh"]

volumes:
  trailforge_pgdata:
  trailforge_runtime_secrets:
  trailforge_certs:
  trailforge_bootstrap:
  trailforge_assets:
  trailforge_backups:
